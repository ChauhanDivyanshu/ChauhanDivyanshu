name: Generate Snake Animation

on:
  # Runs every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  
  # Manually run from Actions tab
  workflow_dispatch:
  
  # Run on push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ChauhanDivyanshu
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#6366F1&color_dots=#1E293B,#4C1D95,#6366F1,#8B5CF6,#EC4899

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
